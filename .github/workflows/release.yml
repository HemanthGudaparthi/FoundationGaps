name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  # ── Rerun full CI on the release commit ─────────────────────────────────────
  ci:
    uses: ./.github/workflows/ci.yml

  # ── E2E tests on all three platforms ────────────────────────────────────────
  e2e-mac:
    name: E2E — macOS
    runs-on: macos-14
    needs: ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version-file: .nvmrc, cache: npm }
      - run: npm ci
      - run: npm run build
      - run: npm run test:e2e

  e2e-windows:
    name: E2E — Windows
    runs-on: windows-latest
    needs: ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version-file: .nvmrc, cache: npm }
      - run: npm ci
      - run: npm run build
      - run: npm run test:e2e

  e2e-linux:
    name: E2E — Linux
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version-file: .nvmrc, cache: npm }
      - run: npm ci && npm run build
      - run: |
          sudo apt-get install -y xvfb
          xvfb-run --auto-servernum npm run test:e2e

  # ── Performance benchmarks ───────────────────────────────────────────────────
  perf:
    name: Performance benchmarks
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version-file: .nvmrc, cache: npm }
      - run: npm ci && npm run build
      - run: sudo apt-get install -y xvfb
      - run: xvfb-run --auto-servernum npm run test:perf

  # ── Package installers ───────────────────────────────────────────────────────
  package-mac:
    name: Package — macOS (.dmg)
    runs-on: macos-14
    needs: [e2e-mac, e2e-windows, e2e-linux, perf]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version-file: .nvmrc, cache: npm }
      - run: npm ci && npm run build
      - name: Build and notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_LINK: ${{ secrets.MAC_CERT_P12_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
        run: npm run package:mac
      - uses: actions/upload-artifact@v4
        with:
          name: contextlens-mac
          path: dist/*.dmg

  package-windows:
    name: Package — Windows (.exe)
    runs-on: windows-latest
    needs: [e2e-mac, e2e-windows, e2e-linux, perf]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version-file: .nvmrc, cache: npm }
      - run: npm ci && npm run build
      - name: Build and sign NSIS installer
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CERT_P12_BASE64 }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CERT_PASSWORD }}
        run: npm run package:win
      - uses: actions/upload-artifact@v4
        with:
          name: contextlens-win
          path: dist/*.exe

  package-linux:
    name: Package — Linux (.AppImage + .deb)
    runs-on: ubuntu-latest
    needs: [e2e-mac, e2e-windows, e2e-linux, perf]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version-file: .nvmrc, cache: npm }
      - run: npm ci && npm run build
      - run: npm run package:linux
      - uses: actions/upload-artifact@v4
        with:
          name: contextlens-linux
          path: |
            dist/*.AppImage
            dist/*.deb

  # ── Publish GitHub Release ───────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [package-mac, package-windows, package-linux]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/download-artifact@v4
        with: { path: dist-artifacts }
      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          NOTES=$(awk "/^## \[$VERSION\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md)
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - uses: softprops/action-gh-release@v2
        with:
          name: ContextLens ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.notes }}
          files: dist-artifacts/**/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
